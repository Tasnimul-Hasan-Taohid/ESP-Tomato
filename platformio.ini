; ================================================================
;  ESP32 Tomato — PlatformIO Configuration
; ================================================================
[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino

; Serial monitor
monitor_speed = 115200

; Upload speed
upload_speed  = 921600

; Build flags
build_flags =
    -D ARDUINO_ARCH_ESP32
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCORE_DEBUG_LEVEL=0

; Partition scheme — 4MB with SPIFFS
board_build.partitions = default.csv
board_build.filesystem = spiffs

; Libraries
lib_deps =
    ESP Async WebServer
    AsyncTCP
    ArduinoJson@^6.21.3
    ESP32Ping
    knolleary/PubSubClient@^2.8

; SPIFFS upload
extra_scripts = pre:scripts/build_spiffs.py

; ── Dev environment with debug output ───────────────────────────
[env:esp32dev_debug]
extends       = env:esp32dev
build_flags   =
    ${env:esp32dev.build_flags}
    -DCORE_DEBUG_LEVEL=3
    -DTOMATO_DEBUG=1
